<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin Martinez - Promo Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .promo-card {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 20px;
            position: relative;
            color: white;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Decorative background elements */
        .promo-card::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .promo-card::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: space-around;
            width: 100%;
        }

        .profile-section {
            animation: slideInDown 0.8s ease-out;
        }

        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            border-radius: 50%;
            border: 5px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            animation: slideInUp 0.8s ease-out 0.2s both;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.95;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.8s ease-out 0.4s both;
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
            animation: slideInUp 0.8s ease-out 0.6s both;
            margin: 20px 0;
        }

        .stat-box {
            text-align: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 5px;
        }

        .cta-button {
            background: white;
            color: #667eea;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            animation: slideInUp 0.8s ease-out 0.8s both;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .footer {
            font-size: 13px;
            opacity: 0.8;
            animation: fadeIn 0.8s ease-out 1s both;
        }

        /* Mobile optimization */
        @media (max-width: 600px) {
            .promo-card {
                max-width: 100%;
                aspect-ratio: 9 / 16;
            }

            h1 {
                font-size: 32px;
            }

            .subtitle {
                font-size: 16px;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="promo-card">
        <div class="content">
            <div class="profile-section">
                <div class="avatar">👨‍💼</div>
                <h1>Benjamin<br>Martinez</h1>
                <p class="subtitle">Entrepreneur • Builder • Leader</p>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <span class="stat-value">Est. 1986</span>
                    <span class="stat-label">RLM Enterprises</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value">$2.8M+</span>
                    <span class="stat-label">Annual Revenue</span>
                </div>
            </div>

            <button class="cta-button">Learn More</button>
            
            <div class="footer">
                www.rlmenterprises.com
            </div>
        </div>
    </div>
</body>
</html>
